spring.application.name=engine_solution
server.port=${PORT:8080}

# Database — injected by Railway
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# AI Engine — your FastAPI on Railway
ml.service.url=${ML_SERVICE_URL}

# JWT — keep same secret
agricredit.app.jwtSecret=${JWT_SECRET}
agricredit.app.jwtExpirationMs=86400000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.root=INFO
logging.level.com.agricredit=INFO
